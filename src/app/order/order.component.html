<section>
    <mat-stepper linear #stepper>
        <mat-step [stepControl]="firstFormGroup" [editable]="true">
            <form [formGroup]="firstFormGroup">
                <ng-template matStepLabel>Fill out your name</ng-template>
                <div class="d-flex flex-column align-items-center container-sm col-8">


                    <div class="d-flex gap-3 w-100">
                        <mat-form-field class="d-flex w-50">
                            <mat-label>Vorname</mat-label>
                            <input matInput formControlName="firstCtrl" placeholder="Vorname" required>
                        </mat-form-field>
                        <mat-form-field class="d-flex w-50">
                            <mat-label>Nachname</mat-label>
                            <input matInput formControlName="firstCtrl" placeholder="Nachname" required>
                        </mat-form-field>

                    </div>
                    <div class="d-flex w-100">
                        <mat-form-field class="w-100">
                            <mat-label>Email</mat-label>
                            <input matInput formControlName="firstCtrl" placeholder="Email" required>
                        </mat-form-field>
                    </div>
                    <div class="d-flex w-100">
                        <mat-form-field class="w-100">
                            <mat-label>Adresse</mat-label>
                            <input matInput formControlName="firstCtrl" placeholder="Adresse" required>
                        </mat-form-field>
                    </div>
                    <div class="d-flex gap-3 w-100">
                        <mat-form-field class="w-25">
                            <mat-label>PLZ</mat-label>
                            <input matInput formControlName="firstCtrl" placeholder="PLZ" maxlength="5" required>
                        </mat-form-field>
                        <mat-form-field class="w-75">
                            <mat-label>Stadt</mat-label>
                            <input matInput formControlName="firstCtrl" placeholder="Stadt" required>
                        </mat-form-field>
                    </div>

                    <div>
                        <button class="btn btn-primary" matStepperNext>Nächste</button>
                    </div>
                </div>
            </form>
        </mat-step>
        <mat-step [stepControl]="secondFormGroup" [editable]="true">
            <form [formGroup]="secondFormGroup">
                <ng-template matStepLabel>Fill out your address</ng-template>
                <mat-form-field>
                    <mat-label>Address</mat-label>
                    <input matInput formControlName="secondCtrl" placeholder="Ex. 1 Main St, New York, NY" required>
                </mat-form-field>
                <div>
                    <button matButton matStepperPrevious>Back</button>
                    <button matButton matStepperNext>Next</button>
                </div>
            </form>
        </mat-step>
        <mat-step>
            <ng-template matStepLabel>Done</ng-template>
            <p>You are now done.</p>
            <div>
                <button matButton matStepperPrevious>Back</button>
                <button matButton (click)="stepper.reset()">Reset</button>
            </div>
        </mat-step>
    </mat-stepper>

</section>
