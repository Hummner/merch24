<section [ngClass]="getOpacity()">
    <div class="content">
        <div class="logo">
            <a [routerLink]="'/'" fragment="home"><img src="assets/img/logo/logo.png" alt=""></a>
            <span>Deine Agentur für alles</span>
        </div>



        <nav>
            <a [routerLink]="'/'">Home</a>
            <a [routerLink]="'/'" fragment="about_me">Über uns</a>
            <a [routerLink]="'/'" fragment="product">Produkte</a>
            <a routerLink="/contact">Kontakt</a>
            <span class="cart-icon" (click)="openEnd(content)"><img src="assets/icons/cart.svg" alt=""></span>
        </nav>
        <div [matMenuTriggerFor]="mobileMenu" class="mobile-menu">
            <img src="assets/icons/menu.svg" alt="">
        </div>
        <mat-menu #mobileMenu="matMenu">
            <div class="mobile-nav">
                <a [routerLink]="'/'" fragment="home">Home</a>
                <a [routerLink]="'/'" fragment="about_me">Über uns</a>
                <a [routerLink]="'/'" fragment="product">Produkte</a>
                <a routerLink="/contact">Kontakt</a>
            </div>

        </mat-menu>


    </div>


</section>



<ng-template #content let-offcanvas>
    <div class="offcanvas-header">
        <h4 class="offcanvas-title">Warenkorb</h4>
        <button type="button" class="btn-close" aria-label="Close" (click)="offcanvas.dismiss('Cross click')"></button>
    </div>

    <div class="card mx-4">
        <div class="card-body">
            Dein Warenkorb is leer!
        </div>
    </div>

    @for (item of [1,2,3]; track $index) {

    <div class="card mx-4 my-1">
        <div class="card-body d-flex justify-content-between align-items-center">
            <img src="assets/img/medal.jpg" alt="">
            <div>
                <p class="card-name m-0">Cheerleader Schal - Essen</p>
                <p class="m-0">
                    Preis: 19,99 €
                </p>
            </div>
            
            <div>
                <input style="width: 50px;" min="1" type="number" value="1" name="" id="">
            </div>
            
        </div>
    </div>
    }

</ng-template>
