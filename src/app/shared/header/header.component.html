<section [ngClass]="getOpacity()">
    <div class="content">
        <div class="logo">
            <a [routerLink]="'/'" fragment="home"><img src="assets/img/logo/logo.png" alt=""></a>
            <span>Deine Agentur für alles</span>
        </div>



        <nav>
            <a [routerLink]="'/'">Home</a>
            <a [routerLink]="'/shop'">Shop</a>
            <a [routerLink]="'/'" fragment="about_me">Über uns</a>
            <a [routerLink]="'/'" fragment="product">Produkte</a>
            <a routerLink="/contact">Kontakt</a>
            <span class="cart-icon" (click)="openCart(content)"  matBadge="{{cart.length}}" matBadgePosition="after" matBadgeHidden="{{cart.length == 0}}"><img src="assets/icons/cart.svg" alt=""></span>
        </nav>
        <div [matMenuTriggerFor]="mobileMenu" class="mobile-menu">
            <img src="assets/icons/menu.svg" alt="" >
        </div>
        <mat-menu #mobileMenu="matMenu">
            <div class="mobile-nav">
                <a [routerLink]="'/'" fragment="home">Home</a>
                <a [routerLink]="'/'" fragment="about_me">Über uns</a>
                <a [routerLink]="'/'" fragment="product">Produkte</a>
                <a routerLink="/contact">Kontakt</a>
            </div>

        </mat-menu>


    </div>


</section>



<ng-template #content let-offcanvas>
    <div class="offcanvas-header">
        <h4 class="offcanvas-title">Warenkorb</h4>
        <button type="button" class="btn-close" aria-label="Close" (click)="offcanvas.dismiss()"></button>
    </div>

    @if (cart.length == 0) {
    <div class="card mx-4">
        <div class="card-body">
            Dein Warenkorb is leer!
        </div>
    </div>
    }
    @for (item of cart; track $index) {

    <div class="card mx-4 my-1">
        <div class="delete-icon" (click)="deleteItemFromCart(item)">
            <img src="assets/icons/delete.svg" alt="delete">
        </div>
        <div class="card-body d-flex justify-content-between align-items-center">
            <img src="assets/img/medal.jpg" alt="">
            <div>
                <p class="card-name m-0">{{item.name}}</p>
                <p class="m-0" *ngIf="item.size">Größe: {{item.size}}</p>
                <p class="m-0">Farbe: {{item.color}}</p>
                <p class="m-0">
                    Preis: {{item.total}} €
                </p>
            </div>

            <div>
                <label for="amount{{item.name}}">Menge:</label>
                <input #amount style="width: 50px;" min="1" type="number" [value]="item.amount" id="amount{{item.name}}"
                    (change)="itemPrice(item, amount.value)">
            </div>

        </div>
    </div>
    }





</ng-template>
