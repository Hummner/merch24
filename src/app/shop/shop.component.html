<section>
    <div class="container-md">
        <div class="row align-items-center justify-content-center gap-4">
            @for (item of [1,2,3]; track $index) {

            <mat-card class="shop-card col-sm-12 col-md-4 col-lg-3" appearance="outlined" (click)="viewProductDetail()">


                <mat-card-header>
                    <mat-card-title>Cheerleader Schal</mat-card-title>
                    <mat-card-subtitle>S-XXL</mat-card-subtitle>
                </mat-card-header>
                <img mat-card-image src="assets/img/fanschals.jpg" alt="Photo of a product">
                <mat-card-content>
                    <p>19,99 €</p>
                </mat-card-content>
            </mat-card>
            }

        </div>



    </div>
</section>
